<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Cambiar Contraseña</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container mt-5 pt-5">
    <h2 class="text-center mb-4 text-primary">Cambiar Contraseña</h2>
    <form id="form-cambio" class="mx-auto shadow p-4 rounded" style="max-width: 500px; background-color: white;">
      <div class="form-group">
        <label for="usuario">Usuario:</label>
        <input type="text" id="usuario" name="usuario" required class="form-control">
      </div>

      <div class="form-group">
        <label for="nuevaContrasena">Nueva Contraseña:</label>
        <input type="password" id="nuevaContrasena" name="nuevaContrasena" required class="form-control">
      </div>

      <button type="submit" class="btn btn-primary btn-block">Cambiar contraseña</button>
      <div id="mensaje" class="mt-3 text-center"></div>
    </form>
  </div>

  <script>
    document.getElementById("form-cambio").addEventListener("submit", function (e) {
      e.preventDefault();

      const usuario = document.getElementById("usuario").value;
      const nuevaContrasena = document.getElementById("nuevaContrasena").value;

      fetch("/cambiar-contrasena", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ usuario, nuevaContrasena })
      })
      .then(res => res.json())
      .then(data => {
        document.getElementById("mensaje").innerText = data.message;
        document.getElementById("mensaje").className = "alert alert-info mt-3";
      })
      .catch(err => {
        console.error("Error:", err);
        document.getElementById("mensaje").innerText = "Error al enviar los datos.";
        document.getElementById("mensaje").className = "alert alert-danger mt-3";
      });
    });
  </script>
</body>
</html>
