<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Iniciar sesión</title>

  <!-- Bootstrap + estilos personalizados -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
  <div class="login-container d-flex justify-content-center align-items-center vh-100">
    <div class="login-box p-5 shadow rounded">
      <h1 class="text-center mb-4 text-primary">Iniciar Sesión</h1>

      <form id="form-login">
        <div class="form-group">
          <label for="usuario" class="font-weight-bold">Usuario</label>
          <input type="text" id="usuario" name="usuario" class="form-control" placeholder="Ingresa tu usuario" required>
        </div>

        <div class="form-group">
          <label for="contraseña" class="font-weight-bold">Contraseña</label>
          <input type="password" id="contraseña" name="contraseña" class="form-control" placeholder="Ingresa tu contraseña" required>
        </div>

        <button type="submit" class="btn btn-primary btn-block mt-4">Iniciar sesión</button>

        <p id="mensaje" class="text-danger mt-3 text-center"></p>

        <div class="text-center mt-4">
          <a href="register.html" class="btn btn-link">¿No tienes cuenta? Regístrate aquí</a><br>
          <a href="cambiar_contrasena.html" class="btn btn-link text-warning font-weight-bold">¿Olvidaste tu contraseña?</a>
        </div>
      </form>
    </div>
  </div>

  <!-- Script principal -->
  <script src="login.js"></script>
</body>
</html>
